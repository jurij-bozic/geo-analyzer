[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm']

[phases.install]
cmds = [
  'pnpm install --frozen-lockfile --filter=@geo-analyzer/shared --filter=@geo-analyzer/worker'
]

[phases.build]
cmds = [
  'cd packages/shared && pnpm run build',
  'cd apps/worker && pnpm run build'
]

[start]
cmd = 'cd apps/worker && node dist/index.js'
